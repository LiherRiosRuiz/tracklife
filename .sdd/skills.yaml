# =============================================================================
# Skill Registry Index — LIHER Workspace
# Indice ligero. NO es un dump de skills.
# El orquestador lee este indice, identifica el proyecto, y pasa al subagente
# el path del registry especifico: .sdd/registries/{proyecto}.yaml
# =============================================================================

version: "2.0"

# ── Registries por proyecto ──────────────────────────────────────────────────
# Cada proyecto tiene su propio registry con solo SUS skills.
# El orquestador carga SOLO el del proyecto objetivo.

registries:
  web1-astro:
    path: .sdd/registries/web1-astro.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  web2-nuxt:
    path: .sdd/registries/web2-nuxt.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  web3-next:
    path: .sdd/registries/web3-next.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  api-laravel:
    path: .sdd/registries/api-laravel.yaml
    manifest: composer.json
    lang: php
    test_ready: true

# ── Skills compartidas (workspace) ──────────────────────────────────────────
# Solo las que aplican a nivel workspace, no por proyecto.

shared:
  orchestration: make up|down|ps|restart|clean|{project}-up|logs-{service}
  docker: docker compose (per-service, redes traefik_net + backend_net)
  port_forward: infra/scripts/wsl-portforward.ps1

# ── Skills de usuario (Claude Code) ─────────────────────────────────────────

user: [/init, /commit, /review, /security-review, /simplify, /loop, /schedule, /update-config, /claude-api]

# ── MCP disponibles ──────────────────────────────────────────────────────────
# Solo nombres. Capacidades detalladas en docs de cada MCP server.

mcp: [filesystem, github, playwright, memory, context7, google_calendar, gmail, google_drive]

# ── Deteccion de manifests ───────────────────────────────────────────────────
# Archivos que el preflight busca para auto-detectar tipo de proyecto.
# Cuando aparece un proyecto nuevo en projects/, el preflight usa esta tabla.

manifest_detection:
  - file: package.json
    indicates: node/npm
    framework_hints: [astro, nuxt, next, react, vue, svelte, angular]
  - file: composer.json
    indicates: php/composer
    framework_hints: [laravel, symfony]
  - file: go.mod
    indicates: go
    framework_hints: [gin, echo, fiber]
  - file: pyproject.toml
    indicates: python
    framework_hints: [django, fastapi, flask]
  - file: Cargo.toml
    indicates: rust
    framework_hints: [actix, axum, rocket]
  - file: tsconfig.json
    indicates: typescript
    note: "complementario — confirma TS si ya hay otro manifest"
  - file: Dockerfile
    indicates: containerized
  - file: docker-compose.yml
    indicates: docker-compose service
