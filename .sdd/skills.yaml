# =============================================================================
# Skill Registry Index — LIHER Workspace
# Indice ligero. NO es un dump de skills.
# El orquestador lee este indice, identifica el proyecto, y pasa al subagente
# el path del registry especifico: .sdd/registries/{proyecto}.yaml
# =============================================================================

version: "2.1"

# ── Stack Skills ─────────────────────────────────────────────────────────────
# Platon carga todos los skills al iniciar sesion (system prompt injection).
# Los registries por proyecto referencian sus skills via skills_ref.

skills_dir: .sdd/skills/
skills:
  astro-6:        { file: astro-6.md,          projects: [web1-astro] }
  react-19:       { file: react-19.md,          projects: [web1-astro, web3-next] }
  nextjs-16:      { file: nextjs-16.md,         projects: [web3-next] }
  nuxt-4:         { file: nuxt-4.md,            projects: [web2-nuxt] }
  laravel-13:     { file: laravel-13.md,        projects: [api-laravel] }
  mongodb-laravel: { file: mongodb-laravel.md,  projects: [api-laravel] }
  devops-docker:  { file: devops-docker.md,     projects: [api-laravel, web1-astro, web2-nuxt, web3-next] }
  security:       { file: security.md,          projects: [api-laravel, web1-astro, web2-nuxt, web3-next] }
  typescript:     { file: typescript-strict.md, projects: [web1-astro, web2-nuxt, web3-next] }
  tailwind-4:     { file: tailwind-4.md,        projects: [web3-next] }

# ── Registries por proyecto ──────────────────────────────────────────────────
# Cada proyecto tiene su propio registry con solo SUS skills.
# El orquestador carga SOLO el del proyecto objetivo.

registries:
  web1-astro:
    path: .sdd/registries/web1-astro.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  web2-nuxt:
    path: .sdd/registries/web2-nuxt.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  web3-next:
    path: .sdd/registries/web3-next.yaml
    manifest: package.json
    lang: typescript
    test_ready: false

  api-laravel:
    path: .sdd/registries/api-laravel.yaml
    manifest: composer.json
    lang: php
    test_ready: true

# ── Skills compartidas (workspace) ──────────────────────────────────────────
# Solo las que aplican a nivel workspace, no por proyecto.

shared:
  orchestration: make up|down|ps|restart|clean|{project}-up|logs-{service}
  docker: docker compose (per-service, redes traefik_net + backend_net)
  port_forward: infra/scripts/wsl-portforward.ps1

# ── Skills de usuario (Claude Code) ─────────────────────────────────────────

user: [/init, /commit, /review, /security-review, /simplify, /loop, /schedule, /update-config, /claude-api, /verify, /run, /code-review, /fewer-permission-prompts, /keybindings-help]

# ── MCP disponibles ──────────────────────────────────────────────────────────
# Solo nombres. Capacidades detalladas en docs de cada MCP server.

mcp: [filesystem, github, playwright, memory, context7, google_calendar, gmail, google_drive, sequential-thinking]

# ── Deteccion de manifests ───────────────────────────────────────────────────
# Archivos que el preflight busca para auto-detectar tipo de proyecto.
# Cuando aparece un proyecto nuevo en projects/, el preflight usa esta tabla.

manifest_detection:
  - file: package.json
    indicates: node/npm
    framework_hints: [astro, nuxt, next, react, vue, svelte, angular]
  - file: composer.json
    indicates: php/composer
    framework_hints: [laravel, symfony]
  - file: go.mod
    indicates: go
    framework_hints: [gin, echo, fiber]
  - file: pyproject.toml
    indicates: python
    framework_hints: [django, fastapi, flask]
  - file: Cargo.toml
    indicates: rust
    framework_hints: [actix, axum, rocket]
  - file: tsconfig.json
    indicates: typescript
    note: "complementario — confirma TS si ya hay otro manifest"
  - file: Dockerfile
    indicates: containerized
  - file: docker-compose.yml
    indicates: docker-compose service
