# =============================================================================
# SDD Config — LIHER Workspace
# Generado por preflight 2026-06-05
# =============================================================================

version: "1.1"
workspace: LIHER
path: D:\Compartida\LIHER

# ── Stack Context ────────────────────────────────────────────────────────────

stack:
  infra:
    proxy:
      name: traefik
      version: "v3"
      entrypoint: ":80"
      dashboard: ":8080"
      discovery: docker-labels
    database:
      name: mongodb
      version: "7"
      network: backend_net
      auth: true
    management:
      name: portainer-ce
      version: lts
      port: 9100
    networks:
      - name: traefik_net
        scope: all-services
      - name: backend_net
        scope: api + database

  projects:
    web1-astro:
      framework: astro
      version: "6.4.4"
      language: typescript
      runtime: node:22-alpine
      integrations: [react-19, vue-3]
      port: 4321
      domain: web1.test
      package_manager: npm

    web2-nuxt:
      framework: nuxt
      version: "4.4.6"
      language: typescript
      runtime: node:22-alpine
      port: 3000
      domain: web2.test
      package_manager: npm

    web3-next:
      framework: nextjs
      version: "16.2.7"
      language: typescript
      runtime: node:22-alpine
      styling: tailwind-4
      port: 3000
      domain: web3.test
      package_manager: npm

    api-laravel:
      framework: laravel
      version: "13.8"
      language: php
      runtime: php:8.3-cli
      database:
        driver: sqlite          # activo
        target: mongodb         # pendiente de cablear
        package: mongodb/laravel-mongodb@5.7
      port: 8000
      domain: api.test
      package_manager: composer

# ── Reglas por Fase ──────────────────────────────────────────────────────────

phases:
  spec:
    description: Definir que se va a construir antes de escribir codigo
    artifacts:
      - CLAUDE.md del proyecto (gobernanza)
      - Spec de endpoints o paginas (cuando aplique)
    gate: el spec debe existir antes de pasar a implement

  implement:
    description: Escribir el codigo segun la spec
    rules:
      - Seguir la gobernanza del CLAUDE.md del proyecto
      - No agregar features fuera del spec
      - Respetar convenciones del framework detectadas
    branching:
      frontends: direct-to-main   # cambiar a feature-branches con codigo custom
      api: feature-branches       # desde el inicio

  test:
    description: Verificar que el codigo cumple la spec
    rules:
      - Ejecutar tests existentes antes de cada commit
      - Verificar build si el framework lo soporta
      - Revisar edge cases segun nivel de review del proyecto

  review:
    description: Revisar cambios antes de integrar
    levels:
      light: funciona y compila
      standard: funcionalidad + edge cases + tests existentes
      exhaustive: standard + seguridad + rendimiento + accesibilidad
    default: standard

  deploy:
    description: Desplegar cambios
    current: docker-compose via Makefile (dev local)
    commands:
      up: make up
      down: make down
      per-project: "make {project}-up"

# ── Testing Capabilities ────────────────────────────────────────────────────
# Deteccion profunda: runners instalados, configs, scripts, transitive deps

testing:
  web1-astro:
    runner:
      installed: false
      recommended: vitest         # Astro usa Vite -> Vitest es nativo
      install: "npm install -D vitest @testing-library/dom"
    browser_testing:
      installed: false
      recommended: "@vitest/browser + playwright"
      install: "npm install -D @vitest/browser @playwright/test"
    config_file: null             # no existe vitest.config.* ni jest.config.*
    scripts: {}                   # no hay scripts test en package.json
    test_dirs: []                 # no existen test/, __tests__/, *.test.*
    lint:
      installed: false
    coverage:
      installed: false
      recommended: "@vitest/coverage-v8"
    status: no-runner
    ready: false

  web2-nuxt:
    runner:
      installed: false
      cli_available: true         # nuxi test existe en @nuxt/cli
      cli_requires: "@nuxt/test-utils"  # falla sin este package
      recommended: "@nuxt/test-utils + vitest"
      install: "npm install -D @nuxt/test-utils vitest"
    browser_testing:
      installed: false
      recommended: "@vitest/browser + playwright"
      install: "npm install -D @vitest/browser @playwright/test"
    config_file: null
    scripts: {}
    test_dirs: []
    lint:
      installed: false
    coverage:
      installed: false
      recommended: "@vitest/coverage-v8"
    status: cli-available-but-missing-deps
    ready: false

  web3-next:
    runner:
      installed: false
      recommended: vitest         # mas ligero que jest para Next.js moderno
      alt: jest                   # opcion clasica de Next.js
      install: "npm install -D vitest @vitejs/plugin-react @testing-library/react @testing-library/dom"
      install_alt: "npm install -D jest @testing-library/react @testing-library/jest-dom"
    browser_testing:
      installed: false
      recommended: "@playwright/test"
      install: "npm install -D @playwright/test"
    config_file: null
    scripts:
      lint: "npm run lint"
    test_dirs: []
    lint:
      installed: true
      tool: eslint-9
      config: eslint.config.mjs
      command: "npm run lint"
    coverage:
      installed: false
      recommended: "@vitest/coverage-v8"
    status: lint-only
    ready: false

  api-laravel:
    runner:
      installed: true
      name: phpunit
      version: "12.5.12"
      alt_available: pest         # pestphp/pest disponible como transitive dep
    browser_testing:
      installed: false
      note: "Playwright MCP cubre E2E sin instalacion local"
    config_file: phpunit.xml
    config_details:
      bootstrap: vendor/autoload.php
      db_connection: sqlite
      db_database: ":memory:"
      env: testing
      disabled: [PULSE, TELESCOPE, NIGHTWATCH]
    scripts:
      test: "php artisan test"
      test_unit: "php artisan test tests/Unit"
      test_feature: "php artisan test tests/Feature"
      test_parallel: "php artisan test --parallel"
      composer_test: "composer test"   # config:clear + artisan test
      lint: "./vendor/bin/pint"
    test_dirs:
      - tests/Unit        # 1 archivo: ExampleTest.php (stub)
      - tests/Feature     # 1 archivo: ExampleTest.php (stub)
    mocking: mockery@^1.6
    fixtures: fakerphp/faker@^1.23
    lint:
      installed: true
      tool: laravel-pint
      command: "./vendor/bin/pint"
    coverage:
      installed: false
      recommended: "php artisan test --coverage"  # requiere pcov o xdebug
    status: ready
    ready: true

  # ── Playwright MCP (workspace-wide) ──────────────────────────────────────
  playwright_mcp:
    available: true
    scope: workspace              # no requiere instalacion por proyecto
    capabilities:
      navigation: [browser_navigate, browser_navigate_back, browser_tabs]
      interaction: [browser_click, browser_fill_form, browser_type, browser_select_option, browser_hover, browser_drag, browser_drop, browser_press_key]
      observation: [browser_snapshot, browser_take_screenshot, browser_console_messages, browser_network_requests]
      control: [browser_wait_for, browser_handle_dialog, browser_resize, browser_evaluate]
    use_cases:
      - E2E smoke tests sin instalacion local
      - Verificacion visual de UI despues de cambios
      - Captura de screenshots para review
      - Testeo interactivo de formularios y navegacion
    limitation: "No genera test files persistentes — es interactivo por sesion"

# ── Calibracion ─────────────────────────────────────────────────────────────
# Verificacion activa de lo detectado en preflight. No se construye nada.
# Cada check tiene: comando, resultado esperado, criticidad (blocker/warning).
# Se ejecuta POR PROYECTO antes de entrar en strict TDD mode.

calibration:
  description: >
    Verifica que lo detectado en el preflight es real y funciona.
    No se pasa a strict TDD hasta que los checks blocker pasen.

  checks:
    # ── 1. Integridad de dependencias ──
    dependencies:
      description: Lock file coherente con manifest, deps instaladas
      criticality: blocker
      per_project:
        web1-astro:
          manifest: package.json
          lockfile: package-lock.json
          verify: "ls projects/web/web1-astro/package-lock.json"
          deps_dir: node_modules      # montado en volumen Docker, verificar en contenedor
          edge_cases:
            - lock file mas viejo que package.json (stale)
            - node_modules vacio tras recrear volumen Docker
        web2-nuxt:
          manifest: package.json
          lockfile: package-lock.json
          verify: "ls projects/web/web2-nuxt/package-lock.json"
          deps_dir: node_modules
          edge_cases:
            - lock file mas viejo que package.json (stale)
            - .nuxt/ desactualizado tras cambio de nuxt.config.ts
        web3-next:
          manifest: package.json
          lockfile: package-lock.json
          verify: "ls projects/web/web3-next/package-lock.json"
          deps_dir: node_modules
          edge_cases:
            - lock file mas viejo que package.json (stale)
            - .next/ corrupto tras interrupcion de build
        api-laravel:
          manifest: composer.json
          lockfile: composer.lock
          verify: "ls projects/web/api-laravel/composer.lock"
          deps_dir: vendor
          edge_cases:
            - composer.lock desincronizado con composer.json
            - vendor vacio tras recrear volumen Docker
            - extension pecl mongodb no cargada en PHP

    # ── 2. Test runner ──
    test_runner:
      description: Si ready=true, ejecutar tests existentes y confirmar que pasan
      criticality: blocker
      per_project:
        web1-astro:
          ready: false
          action: verificar que install recomendado es viable (npm install -D vitest)
          check: "npm info vitest version"  # confirma que el paquete existe en registry
        web2-nuxt:
          ready: false
          action: verificar nuxi test CLI + que @nuxt/test-utils existe en registry
          check: "npm info @nuxt/test-utils version"
        web3-next:
          ready: false
          action: verificar que vitest es instalable
          check: "npm info vitest version"
        api-laravel:
          ready: true
          action: ejecutar tests existentes
          check: "php artisan test"
          expected: "2 tests, 2 assertions, 0 failures"
          edge_cases:
            - sqlite extension no disponible en container
            - vendor/autoload.php no generado
            - APP_KEY no configurado (tests fallan en cifrado)

    # ── 3. Lint ──
    lint:
      description: Si lint instalado, ejecutar y confirmar 0 errores
      criticality: warning
      per_project:
        web1-astro:
          installed: false
          action: skip
        web2-nuxt:
          installed: false
          action: skip
        web3-next:
          installed: true
          check: "npm run lint"
          expected: exit code 0
          edge_cases:
            - eslint.config.mjs importa modulos de node_modules (requiere deps instaladas)
        api-laravel:
          installed: true
          check: "./vendor/bin/pint --test"
          expected: exit code 0

    # ── 4. Build ──
    build:
      description: Verificar que el proyecto compila sin errores
      criticality: warning
      per_project:
        web1-astro:
          check: "npm run build"
          expected: exit code 0
          note: "requiere contenedor Docker corriendo o node_modules local"
        web2-nuxt:
          check: "npm run build"
          expected: exit code 0
        web3-next:
          check: "npm run build"
          expected: exit code 0
        api-laravel:
          check: "php artisan config:clear"
          expected: exit code 0
          note: "config:clear como smoke test de integridad Laravel"

    # ── 5. Coherencia config ──
    config_coherence:
      description: CLAUDE.md del proyecto coincide con config.yaml
      criticality: warning
      checks:
        - versiones de framework en CLAUDE.md == versiones en config.yaml
        - scripts documentados en CLAUDE.md == scripts reales en package.json/composer.json
        - dominios .test en CLAUDE.md == dominios en docker-compose labels

    # ── 6. Edge cases del entorno ──
    environment:
      description: Verificaciones del entorno de ejecucion
      criticality: blocker
      checks:
        docker_running:
          check: "docker info > /dev/null 2>&1"
          expected: exit code 0
          note: "requiere Docker Engine WSL2 activo"
        networks_exist:
          check: "docker network ls --filter name=traefik_net --filter name=backend_net -q"
          expected: dos IDs de red
        env_files:
          - path: infra/mongodb/.env
            required: true
            edge_case: "si falta, MongoDB no arranca"
          - path: projects/web/api-laravel/.env
            required: true
            edge_case: "si falta APP_KEY, artisan test falla"
        ports_free:
          check: "netstat -an | grep -E ':(80|3000|4321|8000|8080|9100) '"
          note: "verificar conflictos antes de levantar servicios"
        disk_space:
          note: "volumenes Docker en WSL2 ext4 — verificar espacio libre"

  # ── Resultado de calibracion ──
  status:
    last_run: null                # se actualiza al ejecutar calibracion
    result: pending               # pending | pass | fail
    blockers: []                  # lista de checks blocker que fallaron
    warnings: []                  # lista de checks warning que fallaron

# ── Strict TDD Mode ─────────────────────────────────────────────────────────
# Solo se activa cuando calibration.status.result == pass

strict_tdd:
  description: >
    Modo de desarrollo donde el test se escribe ANTES que la implementacion.
    Ciclo: RED (test falla) -> GREEN (implementacion minima) -> REFACTOR (limpiar).
  activation:
    prerequisite: calibration.status.result == pass
    gate: no se entra en TDD si hay blockers pendientes en calibracion
    if_runner_not_ready: instalar runner recomendado y recalibrar
  cycle:
    red:
      - Escribir test que describe el comportamiento esperado
      - Ejecutar test — debe FALLAR (confirma que el test detecta ausencia)
      - Si el test pasa sin implementacion, el test no testea nada util
    green:
      - Escribir la implementacion MINIMA para que el test pase
      - Ejecutar test — debe PASAR
      - No optimizar, no refactorizar, no agregar extras
    refactor:
      - Limpiar duplicacion, mejorar nombres, simplificar
      - Ejecutar test — debe seguir PASANDO
      - Si falla, el refactor rompio algo: revertir y reintentar
  rules:
    - No se escribe codigo de produccion sin un test que lo exija
    - Los tests se ejecutan despues de cada cambio (red, green, refactor)
    - Un test que nunca falla no aporta confianza — verificar el RED
    - Commits frecuentes: al menos uno por ciclo GREEN exitoso
  scripts_by_project:
    web1-astro: "npx vitest run"          # tras instalacion
    web2-nuxt: "npx nuxi test"            # tras instalacion de @nuxt/test-utils
    web3-next: "npx vitest run"           # tras instalacion
    api-laravel: "php artisan test"       # ya disponible
  watch_mode:
    web1-astro: "npx vitest"              # vitest watch por defecto
    web2-nuxt: "npx nuxi test --watch"
    web3-next: "npx vitest"
    api-laravel: "php artisan test --watch"  # requiere phpunit-watcher
