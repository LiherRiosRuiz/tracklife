# Skill Registry — api-laravel
# Solo skills aplicables a este proyecto

project: api-laravel
manifest: composer.json
language: php
framework: laravel@13.8

skills:
  dev:
    command: "php artisan serve"
    alt: "make api-up"
  build:
    command: "npm run build"       # vite para assets frontend
    backend: "php artisan config:clear"
  test:
    ready: true
    tool: phpunit@12.5.12
    config: phpunit.xml
    commands:
      run: "php artisan test"
      unit: "php artisan test tests/Unit"
      feature: "php artisan test tests/Feature"
      parallel: "php artisan test --parallel"
      composer: "composer test"    # config:clear + artisan test
    suites: [Unit, Feature]
    mocking: mockery@^1.6
    fixtures: faker@^1.23
  browser_test:
    ready: false
    note: "Playwright MCP cubre E2E sin instalacion local"
  lint:
    ready: true
    tool: laravel-pint
    command: "./vendor/bin/pint"
    check: "./vendor/bin/pint --test"
  format:
    ready: true
    tool: laravel-pint
    command: "./vendor/bin/pint"
