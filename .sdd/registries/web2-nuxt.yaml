# Skill Registry — web2-nuxt
# Solo skills aplicables a este proyecto

project: web2-nuxt
manifest: package.json
language: typescript
framework: nuxt@4.4.6

skills_ref:
  - .sdd/skills/nuxt-4.md
  - .sdd/skills/typescript-strict.md
  - .sdd/skills/devops-docker.md
  - .sdd/skills/security.md

skills:
  dev:
    command: "npm run dev"
    alt: "make web2-up"
  build:
    command: "npm run build"
  test:
    ready: false
    recommended: "@nuxt/test-utils + vitest"
    cli_available: true           # nuxi test existe pero falta @nuxt/test-utils
    install: "npm install -D @nuxt/test-utils vitest"
    run: "npx nuxi test"
    watch: "npx nuxi test --watch"
  browser_test:
    ready: false
    install: "npm install -D @vitest/browser playwright"
    note: "Playwright MCP disponible para E2E interactivo sin instalar"
  lint:
    ready: false
    note: "sin linter configurado"
  format:
    ready: false
