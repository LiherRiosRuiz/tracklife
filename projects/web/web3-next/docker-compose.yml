services:
  web3-next:
    build: .
    container_name: web3-next
    restart: unless-stopped
    volumes:
      - .:/app
      - web3_node_modules:/app/node_modules
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web3.rule=Host(`web3.test`)"
      - "traefik.http.routers.web3.entrypoints=web"
      - "traefik.http.services.web3.loadbalancer.server.port=3000"

volumes:
  web3_node_modules:

networks:
  traefik_net:
    external: true
