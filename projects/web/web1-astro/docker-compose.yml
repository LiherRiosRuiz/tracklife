services:
  web1-astro:
    build: .
    container_name: web1-astro
    restart: unless-stopped
    volumes:
      - .:/app
      - web1_node_modules:/app/node_modules
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web1.rule=Host(`web1.test`)"
      - "traefik.http.routers.web1.entrypoints=web"
      - "traefik.http.services.web1.loadbalancer.server.port=4321"

volumes:
  web1_node_modules:

networks:
  traefik_net:
    external: true
