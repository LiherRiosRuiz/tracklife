services:
  web2-nuxt:
    build: .
    container_name: web2-nuxt
    restart: unless-stopped
    volumes:
      - .:/app
      - web2_node_modules:/app/node_modules
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web2.rule=Host(`web2.test`)"
      - "traefik.http.routers.web2.entrypoints=web"
      - "traefik.http.services.web2.loadbalancer.server.port=3000"

volumes:
  web2_node_modules:

networks:
  traefik_net:
    external: true
